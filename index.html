<html lang="es">

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --line:#dbe3ec;
  --text:#172033;
  --muted:#64748b;
  --navy:#0b3a70;
  --teal:#0ea5a4;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#e11d48;
  --blue:#2563eb;
  --purple:#7c3aed;
  --shadow:0 10px 24px rgba(15,23,42,.07);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
h1,h2,h3,p{margin:0}
.wrap{max-width:1240px;margin:0 auto;padding:20px}
.top{background:linear-gradient(135deg,var(--navy),#155ca8);color:#fff;padding:24px;border-radius:24px;box-shadow:var(--shadow)}
.top h1{font-size:30px;letter-spacing:-.03em}
.top p{margin-top:8px;color:#dbeafe;line-height:1.5}
.top-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.status-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:9px 12px;border-radius:999px;font-weight:700}
.status-dot{width:10px;height:10px;border-radius:999px;background:#fbbf24}
.status-dot.ok{background:#34d399}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.tab-btn,.save-btn,.ghost-btn,.danger-btn,.small-btn{border:none;border-radius:14px;padding:10px 14px;font-weight:800}
.tab-btn,.ghost-btn,.small-btn{background:#fff;color:#0f172a;border:1px solid var(--line)}
.tab-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.save-btn{background:linear-gradient(135deg,var(--teal),#0b8f8e);color:#fff}
.danger-btn{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
.small-btn{padding:7px 10px;border-radius:10px;font-size:13px}
.panel{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px}
.section-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.section-title h2{font-size:26px;letter-spacing:-.03em}
.section-title p{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5;max-width:760px}
.month-box{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px}
.month-box label{font-size:13px;font-weight:800;color:#475569}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a}
textarea{min-height:86px;resize:vertical}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.metric{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;position:relative;overflow:hidden}
.metric::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:#cbd5e1}
.metric.good::before{background:var(--green)}
.metric.warn::before{background:var(--amber)}
.metric.bad::before{background:var(--red)}
.metric.blue::before{background:var(--blue)}
.metric.purple::before{background:var(--purple)}
.metric .l{font-size:13px;color:var(--muted)}
.metric .v{margin-top:8px;font-size:27px;font-weight:900;letter-spacing:-.03em}
.metric .s{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.45}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px}
.card h3{font-size:20px;letter-spacing:-.02em}
.card p.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.5}
.form{display:grid;gap:10px;margin-top:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:grid;gap:5px}
.field label{font-size:12px;font-weight:800;color:#475569}
.check{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font-size:14px;font-weight:700;color:#475569}
.check input{width:auto}
.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.note-box{margin-top:16px;padding:14px;border-radius:16px;background:#f8fafc;border:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.6}
.note-box b{color:#334155}
.xml-box{margin-top:14px;padding:14px;border-radius:16px;background:#eef6ff;border:1px dashed #93c5fd;color:#1e3a8a;font-size:13px;line-height:1.55}
.xml-box input,.xml-box select{margin-top:8px;background:#fff}
.alert-box{margin-top:14px;padding:14px;border-radius:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:13px;line-height:1.55}
.table-title{margin-top:18px;font-size:18px;font-weight:900}
.table-wrap{margin-top:10px;border:1px solid var(--line);border-radius:18px;overflow:auto;background:#fff}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:920px}
thead{background:#f8fafc}
th,td{padding:12px;text-align:left;border-top:1px solid #eef2f7;vertical-align:top}
th{border-top:none;font-size:12px;color:#475569;text-transform:uppercase;white-space:nowrap}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2f7;font-size:12px;font-weight:800;white-space:nowrap}
.badge.good{background:#ecfdf5;color:#166534}
.badge.warn{background:#fffbeb;color:#92400e}
.badge.bad{background:#fff1f2;color:#9f1239}
.badge.blue{background:#eff6ff;color:#1d4ed8}
.badge.purple{background:#f5f3ff;color:#6d28d9}
.empty{padding:24px;text-align:center;color:#64748b}
.danger-text{color:#be123c}.good-text{color:#047857}.muted{color:#64748b}.nowrap{white-space:nowrap}
.code{display:block;width:100%;white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;line-height:1.45;font-size:12px;max-height:360px;overflow:auto}
.progress{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:7px;min-width:110px}
.progress > span{display:block;height:100%;background:var(--teal);width:0%}
@media (max-width:1000px){.metrics,.grid-2,.grid-3,.form-row{grid-template-columns:1fr}.metric .v{font-size:24px}}

<body>
<div class="wrap">
  <div class="top">
    <div class="top-row">
      <div>
        <h1>SotoMed Control</h1>
        <p>Administración simple con facturas PUE/PPD, XML CFDI, complementos de pago, IVA efectivamente cobrado/pagado, cobranza, cuentas por pagar y hojas de servicio.</p>
      </div>
      <div class="status-pill" id="connectionStatus"><span class="status-dot"></span> Modo local</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="panel" id="main"></div>
</div>
<script>
/*
  SotoMed Control V2.1 PPD
  - Lee CFDI de ingreso/egreso para facturas emitidas y recibidas.
  - Lee XML de Complemento para Recepción de Pagos 2.0.
  - Relaciona pagos con facturas PPD por UUID.
  - Calcula IVA estimado por flujo efectivo: PUE + pagos relacionados en complementos.
  - Validar siempre con contador/SAT antes de presentar declaraciones.
*/
const TABLES = {
  issued:'sotomed_issued_invoices',
  received:'sotomed_received_invoices',
  services:'sotomed_service_sheets',
  payments:'sotomed_payment_complements'
};
const STORAGE_KEY = 'sotomed_control_v1';
const tabs = [
  ['dashboard','Dashboard'],
  ['issued','Emitidas'],
  ['received','Recibidas'],
  ['payments','Complementos'],
  ['services','Servicios'],
  ['settings','Configuración']
];
const seed = {
  activeTab:'dashboard',
  month: new Date().toISOString().slice(0,7),
  ivaRate:16,
  isrRate:10,
  supabaseUrl:'https://miztzgfcglvqvvjjtcyv.supabase.co',
  supabaseKey:'sb_publishable_Nei-DTUW7PhVnrKHYHCM8g_9aWq7rvb',
  issued:[],
  received:[],
  payments:[],
  services:[]
};
let state = normalizeState(loadState());
let supabaseClient = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {...seed};
    const parsed = JSON.parse(raw);
    return {...seed, ...parsed,
      supabaseUrl: parsed.supabaseUrl || seed.supabaseUrl,
      supabaseKey: parsed.supabaseKey || seed.supabaseKey,
      issued:Array.isArray(parsed.issued)?parsed.issued:[],
      received:Array.isArray(parsed.received)?parsed.received:[],
      payments:Array.isArray(parsed.payments)?parsed.payments:[],
      services:Array.isArray(parsed.services)?parsed.services:[]
    };
  }catch(err){ return {...seed}; }
}
function normalizeState(s){
  s.issued = (s.issued || []).map(x => normalizeInvoice(x,'issued'));
  s.received = (s.received || []).map(x => normalizeInvoice(x,'received'));
  s.payments = (s.payments || []).map(normalizePayment);
  s.services = s.services || [];
  return s;
}
function normalizeInvoice(x,type){
  const isPaid = !!x.paid;
  return {
    id:x.id || uid(), date:x.date || x.invoice_date || hoy(),
    client:x.client || '', provider:x.provider || '', invoiceNumber:x.invoiceNumber || x.invoice_number || '',
    subtotal:num(x.subtotal), iva:num(x.iva), total:num(x.total), paid:isPaid,
    paymentDate:x.paymentDate || x.payment_date || '', notes:x.notes || '',
    uuid: x.uuid || x.cfdi_uuid || extractUuidFromNotes(x.notes || ''),
    paymentMethod: x.paymentMethod || x.payment_method || x.methodPayment || 'PUE',
    paymentForm: x.paymentForm || x.payment_form || '',
    currency: x.currency || x.moneda || 'MXN',
    cfdiType: x.cfdiType || x.cfdi_type || (type === 'issued' ? 'I' : 'I')
  };
}
function normalizePayment(x){
  let docs = x.docs || x.relatedDocs || x.related_docs || [];
  if(typeof docs === 'string'){
    try{ docs = JSON.parse(docs); }catch(e){ docs = []; }
  }
  if(!Array.isArray(docs)) docs = [];
  return {
    id:x.id || uid(),
    date:x.date || x.payment_date || hoy(),
    type:x.type || x.payment_type || 'issued',
    paymentUuid:x.paymentUuid || x.payment_uuid || x.uuid || '',
    payer:x.payer || '',
    receiver:x.receiver || '',
    amount:num(x.amount),
    iva:num(x.iva),
    currency:x.currency || 'MXN',
    paymentForm:x.paymentForm || x.payment_form || '',
    fileName:x.fileName || x.file_name || '',
    notes:x.notes || '',
    docs: docs.map(d => ({
      invoiceUuid:d.invoiceUuid || d.invoice_uuid || d.idDocumento || d.IdDocumento || '',
      serie:d.serie || d.Serie || '',
      folio:d.folio || d.Folio || '',
      invoiceNumber:d.invoiceNumber || [d.serie || d.Serie, d.folio || d.Folio].filter(Boolean).join('-'),
      partiality:d.partiality || d.NumParcialidad || '',
      previousBalance:num(d.previousBalance || d.ImpSaldoAnt),
      amountPaid:num(d.amountPaid || d.ImpPagado),
      remainingBalance:num(d.remainingBalance || d.ImpSaldoInsoluto),
      taxBase:num(d.taxBase || d.BaseDR),
      ivaPaid:num(d.ivaPaid || d.ImporteDR),
      taxRate:num(d.taxRate || d.TasaOCuotaDR)
    }))
  };
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function connectSupabase(){
  if(state.supabaseUrl && state.supabaseKey && window.supabase){ supabaseClient = supabase.createClient(state.supabaseUrl, state.supabaseKey); }
  else{ supabaseClient = null; }
  updateConnectionStatus();
}
function updateConnectionStatus(){
  const el = document.getElementById('connectionStatus'); if(!el) return;
  el.innerHTML = supabaseClient ? '<span class="status-dot ok"></span> Supabase activo' : '<span class="status-dot"></span> Modo local';
}
function hoy(){ return new Date().toISOString().slice(0,10); }
function uid(){ return 'local_' + Date.now() + '_' + Math.floor(Math.random()*100000); }
function money(n){ return '$' + Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function num(v){ return Number(String(v ?? '').replaceAll(',','')) || 0; }
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function monthFilter(row){ return String(row.date || '').slice(0,7) === state.month; }
function sum(list,key){ return list.reduce((a,b)=>a+num(b[key]),0); }
function calcIva(subtotal){ return +(num(subtotal) * (num(state.ivaRate)/100)).toFixed(2); }
function calcTotal(subtotal, iva){ return +(num(subtotal) + num(iva)).toFixed(2); }
function calcBaseFromTotal(total, iva){ return +(num(total) - num(iva)).toFixed(2); }
function pct(part,total){ return total ? Math.max(0,Math.min(100,(num(part)/num(total))*100)) : 0; }
function extractUuidFromNotes(notes){ const m = String(notes||'').match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/); return m ? m[0].toUpperCase() : ''; }
function sameUuid(a,b){ return String(a||'').toUpperCase() === String(b||'').toUpperCase() && !!a && !!b; }
function rowMonth(row){ return String(row && row.date ? row.date : '').slice(0,7); }
function monthLTE(a,b){ if(!a || !b) return true; return String(a).slice(0,7) <= String(b).slice(0,7); }
function invoiceExistsByMonth(invoice, month){ return monthLTE(rowMonth(invoice), month); }
function invoiceName(type,inv){ return type === 'issued' ? inv.client : inv.provider; }
function metric(label,value,sub,status='blue'){ return `<div class="metric ${status}"><div class="l">${esc(label)}</div><div class="v">${esc(value)}</div><div class="s">${esc(sub)}</div></div>`; }
function methodBadge(inv){
  const m = inv.paymentMethod || 'PUE';
  if(m === 'PPD') return '<span class="badge purple">PPD</span>';
  return '<span class="badge blue">PUE</span>';
}

function findPaymentsForInvoice(type, invoice, throughMonth=null){
  return state.payments.filter(p => {
    if(p.type !== type) return false;
    if(throughMonth && !monthLTE(rowMonth(p), throughMonth)) return false;
    return p.docs.some(d => matchDocInvoice(d, invoice));
  });
}
function matchDocInvoice(doc, invoice){
  if(doc.invoiceUuid && invoice.uuid && sameUuid(doc.invoiceUuid, invoice.uuid)) return true;
  const invNum = String(invoice.invoiceNumber || '').trim().toUpperCase();
  const docNum = String(doc.invoiceNumber || [doc.serie,doc.folio].filter(Boolean).join('-')).trim().toUpperCase();
  return !!invNum && !!docNum && invNum === docNum;
}
function invoicePaymentSummary(type, invoice, throughMonth=null){
  const payments = findPaymentsForInvoice(type, invoice, throughMonth);
  let paidTotal = 0, paidIva = 0, paidBase = 0;
  payments.forEach(p => p.docs.filter(d => matchDocInvoice(d, invoice)).forEach(d => {
    paidTotal += num(d.amountPaid);
    const ivaDoc = num(d.ivaPaid) || estimateIvaFromPayment(d.amountPaid, invoice);
    paidIva += ivaDoc;
    paidBase += num(d.taxBase) || calcBaseFromTotal(d.amountPaid, ivaDoc);
  }));
  const total = num(invoice.total);
  const isPpd = invoice.paymentMethod === 'PPD';
  let effectivePaid = 0, effectiveIva = 0, effectiveBase = 0;
  if(isPpd){
    effectivePaid = paidTotal;
    effectiveIva = paidIva;
    effectiveBase = paidBase;
  }else{
    const paidByPue = invoice.paid || invoice.paymentMethod === 'PUE';
    const paidMonth = rowMonth({date: invoice.paymentDate || invoice.date});
    const countsAsPaid = paidByPue && (!throughMonth || monthLTE(paidMonth, throughMonth));
    effectivePaid = countsAsPaid ? total : 0;
    effectiveIva = countsAsPaid ? num(invoice.iva) : 0;
    effectiveBase = countsAsPaid ? num(invoice.subtotal) : 0;
  }
  const balance = Math.max(total - effectivePaid, 0);
  const status = effectivePaid >= total - 0.01 ? 'paid' : (effectivePaid > 0 ? 'partial' : 'pending');
  return {payments, paidTotal:effectivePaid, paidIva:effectiveIva, paidBase:effectiveBase, balance, status, progress:pct(effectivePaid,total)};
}
function estimateIvaFromPayment(amountPaid, invoice){
  const invoiceRate = invoice && num(invoice.subtotal) ? num(invoice.iva)/num(invoice.subtotal) : num(state.ivaRate)/100;
  return +(num(amountPaid) - (num(amountPaid)/(1+invoiceRate))).toFixed(2);
}
function findInvoiceByDoc(type, doc){
  const list = type === 'issued' ? state.issued : state.received;
  return list.find(inv => matchDocInvoice(doc, inv));
}
function inferPaymentType(payment){
  const issuedHits = payment.docs.filter(d => state.issued.some(inv => matchDocInvoice(d,inv))).length;
  const receivedHits = payment.docs.filter(d => state.received.some(inv => matchDocInvoice(d,inv))).length;
  if(issuedHits > receivedHits) return 'issued';
  if(receivedHits > issuedHits) return 'received';
  return payment.type || 'issued';
}

function cashTaxForMonth(month){
  const issuedPue = state.issued.filter(inv => inv.paymentMethod !== 'PPD' && String(inv.date||'').slice(0,7) === month && (inv.paid || inv.paymentMethod === 'PUE'));
  const receivedPue = state.received.filter(inv => inv.paymentMethod !== 'PPD' && String((inv.paymentDate || inv.date)||'').slice(0,7) === month && (inv.paid || inv.paymentMethod === 'PUE'));
  const monthPayments = state.payments.filter(p => String(p.date||'').slice(0,7) === month);
  const issuedPpd = monthPayments.filter(p => p.type === 'issued');
  const receivedPpd = monthPayments.filter(p => p.type === 'received');

  const issuedPueBase = sum(issuedPue,'subtotal');
  const issuedPueIva = sum(issuedPue,'iva');
  const receivedPueBase = sum(receivedPue,'subtotal');
  const receivedPueIva = sum(receivedPue,'iva');

  let issuedPpdBase = 0, issuedPpdIva = 0, issuedPpdTotal = 0;
  issuedPpd.forEach(p => p.docs.forEach(d => {
    const inv = findInvoiceByDoc('issued',d);
    const iva = num(d.ivaPaid) || estimateIvaFromPayment(d.amountPaid, inv);
    issuedPpdIva += iva;
    issuedPpdBase += num(d.taxBase) || calcBaseFromTotal(d.amountPaid, iva);
    issuedPpdTotal += num(d.amountPaid);
  }));
  let receivedPpdBase = 0, receivedPpdIva = 0, receivedPpdTotal = 0;
  receivedPpd.forEach(p => p.docs.forEach(d => {
    const inv = findInvoiceByDoc('received',d);
    const iva = num(d.ivaPaid) || estimateIvaFromPayment(d.amountPaid, inv);
    receivedPpdIva += iva;
    receivedPpdBase += num(d.taxBase) || calcBaseFromTotal(d.amountPaid, iva);
    receivedPpdTotal += num(d.amountPaid);
  }));

  const ivaCollected = issuedPueIva + issuedPpdIva;
  const ivaCreditable = receivedPueIva + receivedPpdIva;
  const ivaToPay = ivaCollected - ivaCreditable;
  const cashIncomeBase = issuedPueBase + issuedPpdBase;
  const cashExpenseBase = receivedPueBase + receivedPpdBase;
  const profitBase = cashIncomeBase - cashExpenseBase;
  return {issuedPue, receivedPue, issuedPpd, receivedPpd, issuedPueBase, issuedPueIva, receivedPueBase, receivedPueIva, issuedPpdBase, issuedPpdIva, issuedPpdTotal, receivedPpdBase, receivedPpdIva, receivedPpdTotal, ivaCollected, ivaCreditable, ivaToPay, cashIncomeBase, cashExpenseBase, profitBase, estimatedIsr:Math.max(profitBase,0)*(num(state.isrRate)/100)};
}
function getMonthly(){
  const issued = state.issued.filter(monthFilter);
  const received = state.received.filter(monthFilter);
  const payments = state.payments.filter(monthFilter);
  const services = state.services.filter(monthFilter);
  const issuedSubtotal = sum(issued,'subtotal'), issuedIva = sum(issued,'iva'), issuedTotal = sum(issued,'total');
  const receivedSubtotal = sum(received,'subtotal'), receivedIva = sum(received,'iva'), receivedTotal = sum(received,'total');
  const issuedAsOf = state.issued.filter(inv => invoiceExistsByMonth(inv, state.month));
  const receivedAsOf = state.received.filter(inv => invoiceExistsByMonth(inv, state.month));
  const collected = issuedAsOf.reduce((acc,inv)=> acc + invoicePaymentSummary('issued',inv,state.month).paidTotal, 0);
  const issuedTotalAsOf = issuedAsOf.reduce((acc,inv)=>acc+num(inv.total),0);
  const paidExpenses = receivedAsOf.reduce((acc,inv)=> acc + invoicePaymentSummary('received',inv,state.month).paidTotal, 0);
  const receivedTotalAsOf = receivedAsOf.reduce((acc,inv)=>acc+num(inv.total),0);
  const receivable = Math.max(issuedTotalAsOf - collected,0);
  const payable = Math.max(receivedTotalAsOf - paidExpenses,0);
  const pendingServices = services.filter(x=>!x.invoiced);
  const tax = cashTaxForMonth(state.month);
  const ppdIssued = issuedAsOf.filter(x => x.paymentMethod === 'PPD');
  const ppdReceived = receivedAsOf.filter(x => x.paymentMethod === 'PPD');
  const ppdIssuedPending = ppdIssued.filter(x => invoicePaymentSummary('issued',x,state.month).status !== 'paid');
  const ppdReceivedPending = ppdReceived.filter(x => invoicePaymentSummary('received',x,state.month).status !== 'paid');
  return {issued,received,payments,services,issuedSubtotal,issuedIva,issuedTotal,receivedSubtotal,receivedIva,receivedTotal,collected,receivable,paidExpenses,payable,pendingServices,servicePendingAmount:sum(pendingServices,'amount'),tax,ppdIssued,ppdReceived,ppdIssuedPending,ppdReceivedPending};
}

async function loadRemote(){
  if(!supabaseClient) return;
  try{
    const [i,r,s] = await Promise.all([
      supabaseClient.from(TABLES.issued).select('*').order('invoice_date',{ascending:false}),
      supabaseClient.from(TABLES.received).select('*').order('invoice_date',{ascending:false}),
      supabaseClient.from(TABLES.services).select('*').order('service_date',{ascending:false})
    ]);
    if(i.error || r.error || s.error){ alert('No pude cargar Supabase. Revisa que ejecutaste el SQL base.'); console.error(i.error || r.error || s.error); return; }
    state.issued = (i.data || []).map(row => normalizeInvoice({
      id:row.id,date:row.invoice_date,client:row.client,invoiceNumber:row.invoice_number,subtotal:row.subtotal,iva:row.iva,total:row.total,paid:row.paid,paymentDate:row.payment_date,notes:row.notes,uuid:row.uuid,paymentMethod:row.payment_method,paymentForm:row.payment_form,currency:row.currency,cfdiType:row.cfdi_type
    },'issued'));
    state.received = (r.data || []).map(row => normalizeInvoice({
      id:row.id,date:row.invoice_date,provider:row.provider,invoiceNumber:row.invoice_number,subtotal:row.subtotal,iva:row.iva,total:row.total,paid:row.paid,paymentDate:row.payment_date,notes:row.notes,uuid:row.uuid,paymentMethod:row.payment_method,paymentForm:row.payment_form,currency:row.currency,cfdiType:row.cfdi_type
    },'received'));
    state.services = (s.data || []).map(row => ({
      id:row.id,date:row.service_date,client:row.client || '',serviceNumber:row.service_number || '',equipment:row.equipment || '',work:row.work_done || '',amount:num(row.amount),invoiced:!!row.invoiced,invoiceNumber:row.invoice_number || ''
    }));
    const p = await supabaseClient.from(TABLES.payments).select('*').order('payment_date',{ascending:false});
    if(p.error){
      console.warn('Tabla de complementos no disponible todavía. Ejecuta el SQL de actualización V2.', p.error);
      state.payments = state.payments || [];
    }else{
      state.payments = (p.data || []).map(row => normalizePayment({
        id:row.id,date:row.payment_date,type:row.payment_type,paymentUuid:row.payment_uuid,payer:row.payer,receiver:row.receiver,amount:row.amount,iva:row.iva,currency:row.currency,paymentForm:row.payment_form,fileName:row.file_name,notes:row.notes,docs:row.related_docs
      }));
    }
    saveState();
  }catch(err){ console.error(err); alert('Error general al cargar Supabase.'); }
}
async function insertRemote(type,item){

  if(type === 'received') payload = {invoice_date:item.date,provider:item.provider,invoice_number:item.invoiceNumber,subtotal:num(item.subtotal),iva:num(item.iva),total:num(item.total),paid:!!item.paid,payment_date:item.paymentDate || null,notes:item.notes || null,uuid:item.uuid || null,payment_method:item.paymentMethod || 'PUE',payment_form:item.paymentForm || null,currency:item.currency || 'MXN',cfdi_type:item.cfdiType || 'I'};
  if(type === 'services') payload = {service_date:item.date,client:item.client,service_number:item.serviceNumber,equipment:item.equipment,work_done:item.work,amount:num(item.amount),invoiced:!!item.invoiced,invoice_number:item.invoiceNumber || null};

  const {data,error} = await supabaseClient.from(TABLES[type]).insert(payload).select().single();
  if(error) throw error;
  return data;
}
async function updateRemote(type,id,changes){
  if(!supabaseClient) return;
  let payload = {};
  if(type === 'issued' || type === 'received'){
    if('paid' in changes) payload.paid = !!changes.paid;
    if('paymentDate' in changes) payload.payment_date = changes.paymentDate || null;
  }
  if(type === 'services'){
    if('invoiced' in changes) payload.invoiced = !!changes.invoiced;
    if('invoiceNumber' in changes) payload.invoice_number = changes.invoiceNumber || null;
  }

function findFirstByLocalName(root, localName){ return Array.from(root.getElementsByTagName('*')).find(el => el.localName === localName) || null; }
function findChildrenByLocalName(el, localName){ if(!el) return []; return Array.from(el.children || []).filter(child => child.localName === localName); }
function allByLocalName(root, localName){ return Array.from(root.getElementsByTagName('*')).filter(el => el.localName === localName); }
function attr(el,name){ if(!el) return ''; return el.getAttribute(name) || el.getAttribute(name.toLowerCase()) || el.getAttribute(name.toUpperCase()) || ''; }
function parseXmlDoc(xmlText){
  const doc = new DOMParser().parseFromString(xmlText,'application/xml');
  const parserError = doc.getElementsByTagName('parsererror')[0];
  if(parserError) throw new Error('El archivo no parece ser un XML válido.');
  return doc;
}
function parseCfdiXml(xmlText){
  const doc = parseXmlDoc(xmlText);
  const comprobante = doc.documentElement && doc.documentElement.localName === 'Comprobante' ? doc.documentElement : findFirstByLocalName(doc,'Comprobante');
  if(!comprobante) throw new Error('No encontré el nodo Comprobante del CFDI.');
  const emisor = findFirstByLocalName(doc,'Emisor');
  const receptor = findFirstByLocalName(doc,'Receptor');
  const timbre = findFirstByLocalName(doc,'TimbreFiscalDigital');
  const serie = attr(comprobante,'Serie');
  const folio = attr(comprobante,'Folio');
  const uuidFiscal = attr(timbre,'UUID');
  const invoiceNumber = [serie,folio].filter(Boolean).join('-') || folio || serie || uuidFiscal || '';
  const subtotal = num(attr(comprobante,'SubTotal'));
  const total = num(attr(comprobante,'Total'));
  let iva = 0;
  const comprobanteImpuestos = findChildrenByLocalName(comprobante,'Impuestos')[0];
  const totalTrasladados = num(attr(comprobanteImpuestos,'TotalImpuestosTrasladados'));
  if(totalTrasladados) iva = totalTrasladados;
  else{
    const traslados = allByLocalName(doc,'Traslado');
    iva = traslados.filter(el => attr(el,'Impuesto') === '002').reduce((acc,el)=>acc+num(attr(el,'Importe')),0);
  }
  if(!iva && total && subtotal && total >= subtotal) iva = +(total - subtotal).toFixed(2);
  const metodo = attr(comprobante,'MetodoPago') || 'PUE';
  const forma = attr(comprobante,'FormaPago') || '';
  return {date:String(attr(comprobante,'Fecha')||'').slice(0,10) || hoy(), invoiceNumber, subtotal, iva:+iva.toFixed(2), total, uuid:uuidFiscal ? uuidFiscal.toUpperCase() : '', emisorName:attr(emisor,'Nombre') || attr(emisor,'Rfc') || '', emisorRfc:attr(emisor,'Rfc') || '', receptorName:attr(receptor,'Nombre') || attr(receptor,'Rfc') || '', receptorRfc:attr(receptor,'Rfc') || '', paymentMethod:metodo, paymentForm:forma, currency:attr(comprobante,'Moneda') || 'MXN', cfdiType:attr(comprobante,'TipoDeComprobante') || ''};
}
function parsePaymentComplementXml(xmlText,fileName,typeHint){
  const doc = parseXmlDoc(xmlText);
  const comprobante = doc.documentElement && doc.documentElement.localName === 'Comprobante' ? doc.documentElement : findFirstByLocalName(doc,'Comprobante');
  if(!comprobante) throw new Error('No encontré el nodo Comprobante del CFDI.');
  const tipo = attr(comprobante,'TipoDeComprobante');
  if(tipo && tipo !== 'P') throw new Error('Este XML no parece ser un Complemento de Pago: TipoDeComprobante=' + tipo);
  const emisor = findFirstByLocalName(doc,'Emisor');
  const receptor = findFirstByLocalName(doc,'Receptor');
  const timbre = findFirstByLocalName(doc,'TimbreFiscalDigital');
  const pagoNodes = allByLocalName(doc,'Pago');
  if(!pagoNodes.length) throw new Error('No encontré nodos Pago dentro del complemento.');
  const payments = pagoNodes.map(pago => {
    const doctos = findChildrenByLocalName(pago,'DoctoRelacionado');
    let docs = doctos.map(d => {
      const trasladosDR = allByLocalName(d,'TrasladoDR');
      let ivaPaid = 0, taxBase = 0, taxRate = 0;
      trasladosDR.filter(t => attr(t,'ImpuestoDR') === '002').forEach(t => { ivaPaid += num(attr(t,'ImporteDR')); taxBase += num(attr(t,'BaseDR')); taxRate = num(attr(t,'TasaOCuotaDR')) || taxRate; });
      return {invoiceUuid:(attr(d,'IdDocumento') || '').toUpperCase(), serie:attr(d,'Serie'), folio:attr(d,'Folio'), invoiceNumber:[attr(d,'Serie'),attr(d,'Folio')].filter(Boolean).join('-'), partiality:attr(d,'NumParcialidad'), previousBalance:num(attr(d,'ImpSaldoAnt')), amountPaid:num(attr(d,'ImpPagado')), remainingBalance:num(attr(d,'ImpSaldoInsoluto')), taxBase:+taxBase.toFixed(2), ivaPaid:+ivaPaid.toFixed(2), taxRate};
    });
    let totalIva = docs.reduce((a,d)=>a+num(d.ivaPaid),0);
    if(!totalIva){
      const trasladosP = allByLocalName(pago,'TrasladoP');
      totalIva = trasladosP.filter(t => attr(t,'ImpuestoP') === '002').reduce((a,t)=>a+num(attr(t,'ImporteP')),0);
    }
    const payment = normalizePayment({date:String(attr(pago,'FechaPago') || attr(comprobante,'Fecha') || '').slice(0,10) || hoy(), type:typeHint || 'issued', paymentUuid:(attr(timbre,'UUID') || '').toUpperCase(), payer:attr(receptor,'Nombre') || attr(receptor,'Rfc') || '', receiver:attr(emisor,'Nombre') || attr(emisor,'Rfc') || '', amount:num(attr(pago,'Monto')), iva:+totalIva.toFixed(2), currency:attr(pago,'MonedaP') || 'MXN', paymentForm:attr(pago,'FormaDePagoP') || '', fileName:fileName || '', notes:'XML complemento de pago', docs});
    payment.type = typeHint && typeHint !== 'auto' ? typeHint : inferPaymentType(payment);
    return payment;
  });
  return payments;
}
function xmlNotes(data,fileName){
  const pieces = [];
  if(data.uuid) pieces.push('UUID: ' + data.uuid);
  if(data.paymentMethod) pieces.push('Método: ' + data.paymentMethod);
  if(data.paymentForm) pieces.push('Forma: ' + data.paymentForm);
  if(data.emisorRfc) pieces.push('Emisor RFC: ' + data.emisorRfc);
  if(data.receptorRfc) pieces.push('Receptor RFC: ' + data.receptorRfc);
  if(fileName) pieces.push('Archivo XML: ' + fileName);
  return pieces.join(' | ');
}
function fillInvoiceFromXml(type,data,fileName){
  const form = document.getElementById(type + 'Form'); if(!form) return;
  form.elements.date.value = data.date || hoy();
  form.elements.invoiceNumber.value = data.invoiceNumber || '';
  form.elements.subtotal.value = data.subtotal || 0;
  form.elements.iva.value = data.iva || 0;
  form.elements.total.value = data.total || calcTotal(data.subtotal,data.iva);
  form.elements.uuid.value = data.uuid || '';
  form.elements.paymentMethod.value = data.paymentMethod || 'PUE';
  form.elements.paymentForm.value = data.paymentForm || '';
  form.elements.currency.value = data.currency || 'MXN';
  if(type === 'issued') form.elements.client.value = data.receptorName || '';
  else form.elements.provider.value = data.emisorName || '';
  if(data.paymentMethod === 'PUE') form.elements.paid.checked = true;
  const notesInput = document.getElementById(type + 'XmlNotes'); if(notesInput) notesInput.value = xmlNotes(data,fileName);
  const preview = document.getElementById(type + 'XmlPreview');
  if(preview){
    const nombre = type === 'issued' ? data.receptorName : data.emisorName;
    preview.innerHTML = `<b>XML leído correctamente.</b><br>Nombre: ${esc(nombre || 'Sin nombre')}<br>Factura: ${esc(data.invoiceNumber || 'Sin folio')} · ${esc(data.paymentMethod || 'PUE')}<br>Subtotal: ${money(data.subtotal)} · IVA: ${money(data.iva)} · Total: ${money(data.total)}<br>${data.uuid ? 'UUID: ' + esc(data.uuid) : 'UUID no encontrado'}<br><br>Revisa los datos y presiona <b>Guardar</b>.`;
  }
}
function attachXmlImport(type){
  const input = document.getElementById(type + 'XmlFile'); if(!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files && e.target.files[0]; if(!file) return;
    try{ const xmlText = await file.text(); const data = parseCfdiXml(xmlText); fillInvoiceFromXml(type,data,file.name); }
    catch(err){ console.error(err); alert(err.message || 'No pude leer el XML.'); }
  });
}
function paymentSignature(p){
  const docs = (p.docs || []).map(d => [String(d.invoiceUuid||'').toUpperCase(), num(d.amountPaid).toFixed(2), String(d.partiality||'')].join(':')).sort().join('|');
  return [String(p.paymentUuid||'').toUpperCase(), rowMonth(p), p.date, p.type, num(p.amount).toFixed(2), docs].join('::');
}
function paymentAlreadyExists(p){
  const sig = paymentSignature(p);
  return state.payments.some(existing => paymentSignature(existing) === sig);
}
async function importPaymentXmlFiles(){
  const input = document.getElementById('paymentXmlFiles');
  const select = document.getElementById('paymentImportType');
  const preview = document.getElementById('paymentXmlPreview');
  if(!input || !input.files || !input.files.length) return;
  const typeHint = select ? select.value : 'issued';
  let imported = [], errors = [];
  for(const file of Array.from(input.files)){
    try{
      const txt = await file.text();
      const payments = parsePaymentComplementXml(txt,file.name,typeHint);
      for(const p of payments){
        if(paymentAlreadyExists(p)){ errors.push(file.name + ': ya estaba importado, se omitió para no duplicar abonos.'); continue; }
        await addItem('payments',p,false);
        imported.push(p);
      }
    }catch(err){ console.error(err); errors.push(file.name + ': ' + (err.message || 'No pude leer el XML')); }
  }
  saveState();
  if(preview){
    preview.innerHTML = `${imported.length ? '<b>Complementos importados:</b><br>' + imported.map(p => `${esc(p.fileName)} · ${p.type === 'issued' ? 'Cobro cliente' : 'Pago proveedor'} · ${esc(p.paymentUuid || 'sin UUID')} · ${money(p.amount)} · IVA ${money(p.iva)}`).join('<br>') : 'No se importó ningún complemento.'}${errors.length ? '<br><br><b>Errores:</b><br>' + errors.map(esc).join('<br>') : ''}`;
  }
  input.value = '';
  await loadRemote();
  render();
}

  <div class="card"><h3>Resumen de recibidas</h3><p class="sub">Corte del mes seleccionado.</p><div class="metrics" style="grid-template-columns:1fr 1fr">${metric('Total recibido', money(sum(rows,'total')), `${rows.length} facturas`, 'blue')}${metric('IVA facturado', money(sum(rows,'iva')), 'Acreditable si cumple requisitos y está pagado', 'good')}${metric('PPD', String(rows.filter(x=>x.paymentMethod==='PPD').length), 'Requieren complemento', 'purple')}${metric('Pendiente por pagar', money(rows.reduce((a,x)=>a+(num(x.total)-invoicePaymentSummary('received',x).paidTotal),0)), 'Según pagos registrados', 'warn')}</div></div></div>
  <div class="table-title">Listado de facturas recibidas</div>${invoiceTable('received',rows)}`;
}
function viewPayments(){
  const rows = state.payments.filter(monthFilter);
  const issuedRows = rows.filter(x=>x.type==='issued'), receivedRows = rows.filter(x=>x.type==='received');
  return `<div class="section-title"><div><h2>Complementos de pago</h2><p>Aquí cargas los XML de Complemento de Recepción de Pagos. El sistema toma FechaPago, Monto, UUID del pago, documentos relacionados, ImpPagado, saldo insoluto e IVA trasladado del pago.</p></div>${monthBox()}</div>
  <div class="grid-2"><div class="card"><h3>Subir XML de complemento</h3><p class="sub">Puedes subir uno o varios XML. Si el UUID relacionado existe en tus facturas, se relaciona automáticamente.</p><div class="xml-box"><b>Importar complemento de pago XML</b><br><select id="paymentImportType"><option value="auto" selected>Automático por UUID</option><option value="issued">Cobro de cliente - factura emitida</option><option value="received">Pago a proveedor - factura recibida</option></select><input type="file" id="paymentXmlFiles" accept=".xml,text/xml,application/xml" multiple><div id="paymentXmlPreview" style="margin-top:10px">Todavía no has cargado complementos.</div></div><div class="alert-box"><b>Tip:</b> Para facturas emitidas PPD, el complemento normalmente lo emites tú cuando recibes el pago. Para facturas recibidas PPD, tu proveedor te emite el complemento cuando le pagas.</div></div>
  <div class="card"><h3>Resumen del mes</h3><p class="sub">Complementos registrados en el mes seleccionado.</p><div class="metrics" style="grid-template-columns:1fr 1fr">${metric('Cobros cliente', money(sum(issuedRows,'amount')), `${issuedRows.length} complementos`, 'good')}${metric('IVA cobrado PPD', money(sum(issuedRows,'iva')), 'Desde complementos', 'warn')}${metric('Pagos proveedor', money(sum(receivedRows,'amount')), `${receivedRows.length} complementos`, 'blue')}${metric('IVA acreditable PPD', money(sum(receivedRows,'iva')), 'Desde complementos', 'good')}</div></div></div>
  <div class="table-title">Complementos registrados</div>${paymentsTable(rows)}`;
}
function viewServices(){
  const rows = state.services.filter(monthFilter); const pending = rows.filter(x=>!x.invoiced);
  return `<div class="section-title"><div><h2>Hojas de servicio</h2><p>Registro simple para saber qué servicios ya se facturaron y cuáles siguen pendientes.</p></div>${monthBox()}</div>
  <div class="grid-2"><div class="card"><h3>Nueva hoja de servicio</h3><form class="form" id="serviceForm"><div class="field"><label>Fecha</label><input type="date" name="date" value="${hoy()}"></div><div class="field"><label>Cliente</label><input name="client"></div><div class="field"><label>Folio de servicio</label><input name="serviceNumber" placeholder="Ej. HS-001"></div><div class="field"><label>Equipo</label><input name="equipment" placeholder="Ej. BC-5380 / refrigerador / centrifuga"></div><div class="field"><label>Trabajo realizado</label><textarea name="work"></textarea></div><div class="field"><label>Monto</label><input type="number" step="0.01" name="amount"></div><label class="check"><input type="checkbox" name="invoiced"> Ya facturado</label><div class="field"><label>Factura relacionada</label><input name="invoiceNumber" placeholder="Ej. A-001"></div><button class="save-btn" type="submit">Guardar hoja de servicio</button></form></div><div class="card"><h3>Resumen de servicios</h3><div class="metrics" style="grid-template-columns:1fr 1fr">${metric('Servicios', String(rows.length), 'Hojas del mes', 'blue')}${metric('Por facturar', String(pending.length), 'Pendientes', pending.length?'warn':'good')}${metric('Monto total', money(sum(rows,'amount')), 'Servicios registrados', 'good')}${metric('Monto pendiente', money(sum(pending,'amount')), 'Pendiente de factura', pending.length?'warn':'good')}</div></div></div><div class="table-title">Listado de hojas de servicio</div>${servicesTable(rows)}`;
}
function viewSettings(){
  return `<div class="section-title"><div><h2>Configuración</h2><p>Parámetros rápidos para cálculo, conexión con Supabase y SQL actualizado para PPD/complementos.</p></div></div>
  <div class="grid-2"><div class="card"><h3>Impuestos estimados</h3><p class="sub">Se usan para dashboard interno.</p><form class="form" id="taxSettingsForm"><div class="field"><label>IVA %</label><input type="number" step="0.01" name="ivaRate" value="${esc(state.ivaRate)}"></div><div class="field"><label>ISR estimado %</label><input type="number" step="0.01" name="isrRate" value="${esc(state.isrRate)}"></div><button class="save-btn" type="submit">Guardar configuración</button></form><div class="note-box">El ISR sigue siendo estimado. Depende de régimen, deducciones, retenciones y criterio de tu contador.</div></div>
  <div class="card"><h3>Conexión Supabase</h3><p class="sub">Para guardar en la nube desde GitHub Pages.</p><form class="form" id="supabaseSettingsForm"><div class="field"><label>Supabase URL</label><input name="supabaseUrl" value="${esc(state.supabaseUrl)}" placeholder="https://xxxxx.supabase.co"></div><div class="field"><label>Publishable / Anon Key</label><textarea name="supabaseKey" placeholder="sb_publishable... o anon key">${esc(state.supabaseKey)}</textarea></div><button class="save-btn" type="submit">Guardar conexión</button></form><div class="actions-row"><button class="ghost-btn" id="testSupabaseBtn">Probar / cargar datos</button><button class="danger-btn" id="clearLocalBtn">Borrar datos locales</button></div></div></div>
  <div class="card" style="margin-top:16px"><h3>SQL Supabase V2 PPD + Complementos</h3><p class="sub">Ejecuta este SQL en Supabase SQL Editor. Agrega columnas PPD a tus tablas actuales y crea la tabla de complementos.</p><div class="actions-row"><button class="ghost-btn" id="copySqlBtn">Copiar SQL</button></div><pre class="code" id="sqlBlock">${esc(SUPABASE_SQL)}</pre></div>`;
}
function invoiceTable(type,rows,compact=false){
  const nameCol = type === 'issued' ? 'Cliente' : 'Proveedor';
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin registros</div></div>`;
  return `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>${nameCol}</th><th>Factura</th><th>Método</th><th>UUID</th><th>Total</th><th>Pagado</th><th>IVA efectivo</th><th>Estado</th>${compact?'':'<th>Acciones</th>'}</tr></thead><tbody>${rows.map(r => {
    const ps = invoicePaymentSummary(type,r);
    const statusHtml = ps.status === 'paid' ? '<span class="badge good">Pagada</span>' : ps.status === 'partial' ? '<span class="badge purple">Parcial</span>' : '<span class="badge warn">Pendiente</span>';
    return `<tr><td>${esc(r.date)}</td><td>${esc(type==='issued'?r.client:r.provider)}</td><td>${esc(r.invoiceNumber)}<br><span class="muted">${money(r.subtotal)} + IVA ${money(r.iva)}</span></td><td>${methodBadge(r)}<br><span class="muted">${esc(r.paymentForm || '')}</span></td><td><span class="muted">${esc(r.uuid || 'Sin UUID')}</span></td><td><b>${money(r.total)}</b></td><td>${money(ps.paidTotal)}<div class="progress"><span style="width:${ps.progress}%"></span></div></td><td>${money(ps.paidIva)}</td><td>${statusHtml}</td>${compact?'':`<td><button class="small-btn" data-toggle-paid="${type}" data-id="${esc(r.id)}">${r.paid?'Marcar pendiente':'Marcar pagada'}</button><button class="danger-btn small-btn" data-delete="${type}" data-id="${esc(r.id)}">Borrar</button></td>`}</tr>`;
  }).join('')}</tbody></table></div>`;
}
function paymentsTable(rows,compact=false){
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin complementos registrados</div></div>`;
  return `<div class="table-wrap"><table><thead><tr><th>Fecha pago</th><th>Tipo</th><th>UUID pago</th><th>Relacionado</th><th>Monto</th><th>IVA</th><th>Archivo</th>${compact?'':'<th>Acciones</th>'}</tr></thead><tbody>${rows.map(p => {
    const docsHtml = p.docs.map(d => {
      const inv = findInvoiceByDoc(p.type,d);
      return `${esc(d.invoiceNumber || d.invoiceUuid || 'Documento')}<br><span class="muted">UUID: ${esc(d.invoiceUuid || 'sin UUID')} · Parcialidad: ${esc(d.partiality || '')} · Pagado: ${money(d.amountPaid)} · Saldo: ${money(d.remainingBalance)}${inv ? ' · Relacionada' : ' · No encontrada'}</span>`;
    }).join('<hr style="border:none;border-top:1px solid #eef2f7">');
    return `<tr><td>${esc(p.date)}</td><td>${p.type==='issued'?'<span class="badge good">Cobro cliente</span>':'<span class="badge blue">Pago proveedor</span>'}</td><td><span class="muted">${esc(p.paymentUuid || 'Sin UUID')}</span></td><td>${docsHtml}</td><td><b>${money(p.amount)}</b></td><td>${money(p.iva)}</td><td>${esc(p.fileName || '')}</td>${compact?'':`<td><button class="danger-btn small-btn" data-delete="payments" data-id="${esc(p.id)}">Borrar</button></td>`}</tr>`;
  }).join('')}</tbody></table></div>`;
}
function servicesTable(rows){
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin registros</div></div>`;
  return `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Cliente</th><th>Folio</th><th>Equipo</th><th>Trabajo</th><th>Monto</th><th>Estado</th><th>Factura</th><th>Acciones</th></tr></thead><tbody>${rows.map(r => `<tr><td>${esc(r.date)}</td><td>${esc(r.client)}</td><td>${esc(r.serviceNumber)}</td><td>${esc(r.equipment)}</td><td>${esc(r.work)}</td><td><b>${money(r.amount)}</b></td><td>${r.invoiced ? '<span class="badge good">Facturado</span>' : '<span class="badge warn">Pendiente</span>'}</td><td>${esc(r.invoiceNumber || '')}</td><td><button class="small-btn" data-toggle-service="${esc(r.id)}">${r.invoiced?'Marcar pendiente':'Marcar facturado'}</button><button class="danger-btn small-btn" data-delete="services" data-id="${esc(r.id)}">Borrar</button></td></tr>`).join('')}</tbody></table></div>`;
}
function attachEvents(){
  document.getElementById('monthInput')?.addEventListener('change', e => { state.month = e.target.value || state.month; saveState(); render(); });
  document.getElementById('reloadBtn')?.addEventListener('click', async () => { await loadRemote(); render(); });
  autoCalc('issued'); autoCalc('received'); attachXmlImport('issued'); attachXmlImport('received');
  document.getElementById('paymentXmlFiles')?.addEventListener('change', importPaymentXmlFiles);
  document.getElementById('issuedForm')?.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); const item = normalizeInvoice({id:uid(),date:fd.get('date') || hoy(),client:fd.get('client') || '',invoiceNumber:fd.get('invoiceNumber') || '',subtotal:fd.get('subtotal'),iva:fd.get('iva'),total:fd.get('total'),paid:fd.get('paid')==='on',paymentDate:fd.get('paymentDate') || '',notes:fd.get('xmlNotes') || '',uuid:String(fd.get('uuid')||'').toUpperCase(),paymentMethod:fd.get('paymentMethod') || 'PUE',paymentForm:fd.get('paymentForm') || '',currency:fd.get('currency') || 'MXN'},'issued'); await addItem('issued',item); });
  document.getElementById('receivedForm')?.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); const item = normalizeInvoice({id:uid(),date:fd.get('date') || hoy(),provider:fd.get('provider') || '',invoiceNumber:fd.get('invoiceNumber') || '',subtotal:fd.get('subtotal'),iva:fd.get('iva'),total:fd.get('total'),paid:fd.get('paid')==='on',paymentDate:fd.get('paymentDate') || '',notes:fd.get('xmlNotes') || '',uuid:String(fd.get('uuid')||'').toUpperCase(),paymentMethod:fd.get('paymentMethod') || 'PUE',paymentForm:fd.get('paymentForm') || '',currency:fd.get('currency') || 'MXN'},'received'); await addItem('received',item); });
  document.getElementById('serviceForm')?.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); const item = {id:uid(),date:fd.get('date') || hoy(),client:fd.get('client') || '',serviceNumber:fd.get('serviceNumber') || '',equipment:fd.get('equipment') || '',work:fd.get('work') || '',amount:num(fd.get('amount')),invoiced:fd.get('invoiced')==='on',invoiceNumber:fd.get('invoiceNumber') || ''}; await addItem('services',item); });
  document.getElementById('taxSettingsForm')?.addEventListener('submit', e => { e.preventDefault(); const fd = new FormData(e.target); state.ivaRate = num(fd.get('ivaRate')); state.isrRate = num(fd.get('isrRate')); saveState(); alert('Configuración guardada.'); render(); });
  document.getElementById('supabaseSettingsForm')?.addEventListener('submit', async e => { e.preventDefault(); const fd = new FormData(e.target); state.supabaseUrl = String(fd.get('supabaseUrl') || '').trim(); state.supabaseKey = String(fd.get('supabaseKey') || '').trim(); saveState(); connectSupabase(); await loadRemote(); render(); });
  document.getElementById('testSupabaseBtn')?.addEventListener('click', async () => { connectSupabase(); await loadRemote(); render(); });
  document.getElementById('clearLocalBtn')?.addEventListener('click', () => { if(confirm('¿Borrar datos locales de este navegador? No borra Supabase.')){ localStorage.removeItem(STORAGE_KEY); state = normalizeState({...seed}); connectSupabase(); render(); } });
  document.getElementById('copySqlBtn')?.addEventListener('click', async () => { await navigator.clipboard.writeText(SUPABASE_SQL); alert('SQL copiado.'); });
  document.querySelectorAll('[data-toggle-paid]').forEach(btn => { btn.onclick = async () => { const type = btn.dataset.togglePaid; const id = btn.dataset.id; const item = state[type].find(x => String(x.id) === String(id)); if(!item) return; item.paid = !item.paid; item.paymentDate = item.paid ? (item.paymentDate || hoy()) : ''; try{ if(supabaseClient && !String(id).startsWith('local_')){ await updateRemote(type,id,{paid:item.paid,paymentDate:item.paymentDate}); await loadRemote(); } saveState(); render(); }catch(err){ console.error(err); alert('No pude actualizar.'); } }; });
  document.querySelectorAll('[data-toggle-service]').forEach(btn => { btn.onclick = async () => { const id = btn.dataset.toggleService; const item = state.services.find(x => String(x.id) === String(id)); if(!item) return; item.invoiced = !item.invoiced; if(item.invoiced && !item.invoiceNumber) item.invoiceNumber = prompt('Número de factura relacionada, si aplica:', '') || ''; try{ if(supabaseClient && !String(id).startsWith('local_')){ await updateRemote('services',id,{invoiced:item.invoiced,invoiceNumber:item.invoiceNumber}); await loadRemote(); } saveState(); render(); }catch(err){ console.error(err); alert('No pude actualizar.'); } }; });
  document.querySelectorAll('[data-delete]').forEach(btn => { btn.onclick = async () => { const type = btn.dataset.delete; const id = btn.dataset.id; if(!confirm('¿Borrar este registro?')) return; try{ if(supabaseClient && !String(id).startsWith('local_')){ await deleteRemote(type,id); await loadRemote(); }else{ state[type] = state[type].filter(x => String(x.id) !== String(id)); } saveState(); render(); }catch(err){ console.error(err); alert('No pude borrar.'); } }; });
}
function autoCalc(type){
  const sub = document.getElementById(type+'Subtotal'), iva = document.getElementById(type+'Iva'), total = document.getElementById(type+'Total');
  if(!sub || !iva || !total) return;
  function update(){ const ivaCalc = calcIva(sub.value); iva.value = ivaCalc; total.value = calcTotal(sub.value,ivaCalc); }
  sub.addEventListener('input', update); iva.addEventListener('input', () => total.value = calcTotal(sub.value,iva.value));
}
async function addItem(type,item,refresh=true){
  try{
    if(supabaseClient){ await insertRemote(type,item); if(refresh) await loadRemote(); }
    else{ state[type].unshift(item); }
    saveState(); if(refresh) render();
  }catch(err){ console.error(err); alert('No pude guardar. Si estás usando Supabase, ejecuta el SQL V2 y revisa URL, key y permisos. Detalle: ' + (err.message || '')); }
}
const SUPABASE_SQL = `-- SotoMed Control V2.1 PPD + Complementos de Pago
-- Ejecuta esto en Supabase > SQL Editor.
-- Primero conserva tus tablas actuales y agrega columnas para UUID, PUE/PPD y complementos.
-- Nota de seguridad: estas políticas abiertas sirven para arranque sin login. En producción conviene usar autenticación y RLS por usuario.

create table if not exists public.sotomed_issued_invoices (
  id bigint generated always as identity primary key,
  created_at timestamptz not null default now(),
  invoice_date date not null,
  client text,
  invoice_number text,
  subtotal numeric(12,2) not null default 0,
  iva numeric(12,2) not null default 0,
  total numeric(12,2) not null default 0,
  paid boolean not null default false,
  payment_date date,
  notes text
);

create table if not exists public.sotomed_received_invoices (
  id bigint generated always as identity primary key,
  created_at timestamptz not null default now(),
  invoice_date date not null,
  provider text,
  invoice_number text,
  subtotal numeric(12,2) not null default 0,
  iva numeric(12,2) not null default 0,
  total numeric(12,2) not null default 0,
  paid boolean not null default false,
  payment_date date,
  notes text
);

create table if not exists public.sotomed_service_sheets (
  id bigint generated always as identity primary key,
  created_at timestamptz not null default now(),
  service_date date not null,
  client text,
  service_number text,
  equipment text,
  work_done text,
  amount numeric(12,2) not null default 0,
  invoiced boolean not null default false,
  invoice_number text
);

alter table public.sotomed_issued_invoices add column if not exists uuid text;
alter table public.sotomed_issued_invoices add column if not exists payment_method text not null default 'PUE';
alter table public.sotomed_issued_invoices add column if not exists payment_form text;
alter table public.sotomed_issued_invoices add column if not exists currency text not null default 'MXN';
alter table public.sotomed_issued_invoices add column if not exists cfdi_type text;

alter table public.sotomed_received_invoices add column if not exists uuid text;
alter table public.sotomed_received_invoices add column if not exists payment_method text not null default 'PUE';
alter table public.sotomed_received_invoices add column if not exists payment_form text;
alter table public.sotomed_received_invoices add column if not exists currency text not null default 'MXN';
alter table public.sotomed_received_invoices add column if not exists cfdi_type text;

create table if not exists public.sotomed_payment_complements (
  id bigint generated always as identity primary key,
  created_at timestamptz not null default now(),
  payment_date date not null,
  payment_type text not null check (payment_type in ('issued','received')),
  payment_uuid text,
  payer text,
  receiver text,
  amount numeric(12,2) not null default 0,
  iva numeric(12,2) not null default 0,
  currency text not null default 'MXN',
  payment_form text,
  file_name text,
  notes text,
  related_docs jsonb not null default '[]'::jsonb
);

alter table public.sotomed_issued_invoices enable row level security;
alter table public.sotomed_received_invoices enable row level security;
alter table public.sotomed_service_sheets enable row level security;
alter table public.sotomed_payment_complements enable row level security;

drop policy if exists "sotomed issued anon all" on public.sotomed_issued_invoices;
drop policy if exists "sotomed received anon all" on public.sotomed_received_invoices;
drop policy if exists "sotomed services anon all" on public.sotomed_service_sheets;
drop policy if exists "sotomed payments anon all" on public.sotomed_payment_complements;

create policy "sotomed issued anon all" on public.sotomed_issued_invoices for all to anon using (true) with check (true);
create policy "sotomed received anon all" on public.sotomed_received_invoices for all to anon using (true) with check (true);
create policy "sotomed services anon all" on public.sotomed_service_sheets for all to anon using (true) with check (true);
create policy "sotomed payments anon all" on public.sotomed_payment_complements for all to anon using (true) with check (true);

create index if not exists idx_sotomed_issued_invoice_date on public.sotomed_issued_invoices(invoice_date);
create index if not exists idx_sotomed_received_invoice_date on public.sotomed_received_invoices(invoice_date);
create index if not exists idx_sotomed_service_date on public.sotomed_service_sheets(service_date);
create index if not exists idx_sotomed_issued_uuid on public.sotomed_issued_invoices(uuid);
create index if not exists idx_sotomed_received_uuid on public.sotomed_received_invoices(uuid);
create index if not exists idx_sotomed_payment_date on public.sotomed_payment_complements(payment_date);
create index if not exists idx_sotomed_payment_uuid on public.sotomed_payment_complements(payment_uuid);`;
connectSupabase();
loadRemote().then(render);
</script>
