<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SotoMed Control | Administración local</title>
<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --line:#dbe3ec;
  --text:#172033;
  --muted:#64748b;
  --navy:#0b3a70;
  --teal:#0ea5a4;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#e11d48;
  --blue:#2563eb;
  --shadow:0 10px 24px rgba(15,23,42,.07);
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
h1,h2,h3,p{margin:0}
.wrap{max-width:1180px;margin:0 auto;padding:20px}
.top{
  background:linear-gradient(135deg,var(--navy),#155ca8);
  color:#fff;
  padding:24px;
  border-radius:24px;
  box-shadow:var(--shadow);
}
.top h1{font-size:30px;letter-spacing:-.03em}
.top p{margin-top:8px;color:#dbeafe;line-height:1.5}
.top-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.status-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:9px 12px;border-radius:999px;font-weight:700}
.status-dot{width:10px;height:10px;border-radius:999px;background:#fbbf24}
.status-dot.ok{background:#34d399}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.tab-btn,.save-btn,.ghost-btn,.danger-btn,.small-btn{
  border:none;border-radius:14px;padding:10px 14px;font-weight:800;
}
.tab-btn,.ghost-btn,.small-btn{background:#fff;color:#0f172a;border:1px solid var(--line)}
.tab-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.save-btn{background:linear-gradient(135deg,var(--teal),#0b8f8e);color:#fff}
.danger-btn{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
.small-btn{padding:7px 10px;border-radius:10px;font-size:13px}
.panel{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px}
.section-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
.section-title h2{font-size:26px;letter-spacing:-.03em}
.section-title p{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.5}
.month-box{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px}
.month-box label{font-size:13px;font-weight:800;color:#475569}
input,select,textarea{
  width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;
}
textarea{min-height:86px;resize:vertical}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px}
.metric{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;position:relative;overflow:hidden}
.metric::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:#cbd5e1}
.metric.good::before{background:var(--green)}
.metric.warn::before{background:var(--amber)}
.metric.bad::before{background:var(--red)}
.metric.blue::before{background:var(--blue)}
.metric .l{font-size:13px;color:var(--muted)}
.metric .v{margin-top:8px;font-size:27px;font-weight:900;letter-spacing:-.03em}
.metric .s{margin-top:8px;font-size:13px;color:var(--muted);line-height:1.45}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:18px}
.card h3{font-size:20px;letter-spacing:-.02em}
.card p.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.5}
.form{display:grid;gap:10px;margin-top:14px}
.field{display:grid;gap:5px}
.field label{font-size:12px;font-weight:800;color:#475569}
.check{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font-size:14px;font-weight:700;color:#475569}
.check input{width:auto}
.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.note-box{margin-top:16px;padding:14px;border-radius:16px;background:#f8fafc;border:1px solid var(--line);color:var(--muted);font-size:13px;line-height:1.6}
.note-box b{color:#334155}
.xml-box{margin-top:14px;padding:14px;border-radius:16px;background:#eef6ff;border:1px dashed #93c5fd;color:#1e3a8a;font-size:13px;line-height:1.55}
.xml-box input{margin-top:8px;background:#fff}
.table-title{margin-top:18px;font-size:18px;font-weight:900}
.table-wrap{margin-top:10px;border:1px solid var(--line);border-radius:18px;overflow:auto;background:#fff}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}
thead{background:#f8fafc}
th,td{padding:12px;text-align:left;border-top:1px solid #eef2f7;vertical-align:top}
th{border-top:none;font-size:12px;color:#475569;text-transform:uppercase;white-space:nowrap}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2f7;font-size:12px;font-weight:800}
.badge.good{background:#ecfdf5;color:#166534}
.badge.warn{background:#fffbeb;color:#92400e}
.badge.bad{background:#fff1f2;color:#9f1239}
.empty{padding:24px;text-align:center;color:#64748b}
.danger-text{color:#be123c}
.good-text{color:#047857}
.code{
  display:block;width:100%;white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;line-height:1.45;font-size:12px;max-height:320px;overflow:auto;
}

.login-card{max-width:820px;margin:0 auto}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.login-badge{display:inline-block;margin-top:8px;padding:7px 10px;border-radius:999px;background:#eef6ff;color:#0b3a70;font-size:12px;font-weight:900}
@media (max-width:760px){.login-grid{grid-template-columns:1fr}}
@media (max-width:1000px){
  .metrics,.grid-2,.grid-3{grid-template-columns:1fr}
  .metric .v{font-size:24px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="top-row">
      <div>
        <h1>SotoMed Control</h1>
        <p>Administración local: facturas, XML CFDI, IVA, ISR, cobranza, PPD, abonos, servicios y pedidos.</p>
      </div>
      <div class="status-pill" id="connectionStatus"><span class="status-dot"></span> Modo local</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="panel" id="main"></div>
</div>

<script>
/*
  SotoMed Control Local V1.6
  - Funciona únicamente en esta computadora mediante localStorage.
  - Lee XML CFDI para llenar facturas emitidas y recibidas.
  - Incluye respaldo y restauración en archivo JSON.
  - Este sistema es control interno; valida impuestos finales con tu contador.
*/


const STORAGE_KEY = 'sotomed_control_v1';
const SESSION_KEY = 'sotomed_control_session_v1';

// Claves simples de esta V1.5. Cambia estos valores si el cliente quiere otras claves.
const ADMIN_PASSWORD = '9wkmry1d';
const SELLER_PASSWORD = 'pedidos123';

const ADMIN_TABS = [
  ['dashboard','Dashboard'],
  ['issued','Emitidas'],
  ['collections','Cobranza'],
  ['received','Recibidas'],
  ['services','Servicios'],
  ['orders','Pedidos'],
  ['settings','Configuración']
];

const SELLER_TABS = [
  ['orders','Pedidos']
];

const seed = {
  activeTab:'dashboard',
  month: new Date().toISOString().slice(0,7),
  ivaRate:16,
  isrRate:10,
  issued:[],
  received:[],
  services:[],
  payments:[],
  orders:[]
};

let state = loadState();
let session = loadSession();

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return {...seed};
    const parsed = JSON.parse(raw);
    return {...seed, ...parsed,
      issued:Array.isArray(parsed.issued)?parsed.issued:[],
      received:Array.isArray(parsed.received)?parsed.received:[],
      services:Array.isArray(parsed.services)?parsed.services:[],
      payments:Array.isArray(parsed.payments)?parsed.payments:[],
      orders:Array.isArray(parsed.orders)?parsed.orders:[]
    };
  }catch(err){
    return {...seed};
  }
}

function cleanStateForStorage(source){
  const clean = {...source};
  delete clean.supabaseUrl;
  delete clean.supabaseKey;
  return clean;
}

function saveState(){
  try{
    state = cleanStateForStorage(state);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(err){
    console.error(err);
    alert('No pude guardar en esta computadora. Revisa el espacio disponible del navegador.');
  }
}

function stateFromBackup(data){
  const source = data && typeof data === 'object' && data.state && typeof data.state === 'object'
    ? data.state
    : data;
  if(!source || typeof source !== 'object'){
    throw new Error('El respaldo no contiene datos válidos.');
  }
  const restored = {
    ...seed,
    ...source,
    issued:Array.isArray(source.issued)?source.issued:[],
    received:Array.isArray(source.received)?source.received:[],
    services:Array.isArray(source.services)?source.services:[],
    payments:Array.isArray(source.payments)?source.payments:[],
    orders:Array.isArray(source.orders)?source.orders:[]
  };
  return cleanStateForStorage(restored);
}

function exportBackup(){
  const payload = {
    app:'SotoMed Control',
    version:'1.6-local',
    exportedAt:new Date().toISOString(),
    state:cleanStateForStorage(state)
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `sotomed_respaldo_${hoy()}.json`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function importBackupFile(file){
  const raw = await file.text();
  const parsed = JSON.parse(raw);
  state = stateFromBackup(parsed);
  saveState();
}

function loadSession(){
  try{
    return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || {role:''};
  }catch(err){
    return {role:''};
  }
}

function saveSession(){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function logout(){
  session = {role:''};
  sessionStorage.removeItem(SESSION_KEY);
  render();
}

function roleName(){
  if(session.role === 'admin') return 'Administración';
  if(session.role === 'seller') return 'Vendedor';
  return 'Sin acceso';
}

function allowedTabs(){
  return session.role === 'seller' ? SELLER_TABS : ADMIN_TABS;
}

function updateConnectionStatus(){
  const el = document.getElementById('connectionStatus');
  if(!el) return;
  const role = session.role ? ' · ' + roleName() : '';
  el.innerHTML = '<span class="status-dot ok"></span> Datos locales' + role;
}

function hoy(){ return new Date().toISOString().slice(0,10); }
function uid(){ return 'local_' + Date.now() + '_' + Math.floor(Math.random()*10000); }
function money(n){ return '$' + Number(n||0).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function num(v){ return Number(String(v ?? '').replaceAll(',','')) || 0; }
function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function monthFilter(row){ return String(row.date || '').slice(0,7) === state.month; }
function sum(list,key){ return list.reduce((a,b)=>a+num(b[key]),0); }
function calcIva(subtotal){ return +(num(subtotal) * (num(state.ivaRate)/100)).toFixed(2); }
function calcTotal(subtotal, iva){ return +(num(subtotal) + num(iva)).toFixed(2); }
function rowId(row){ return String(row?.id ?? ''); }
function paymentsForInvoice(invoiceId){
  const id = String(invoiceId || '');
  return (state.payments || []).filter(p => String(p.invoiceId || p.invoice_id || '') === id);
}
function paidAmountForInvoice(inv){
  const pays = paymentsForInvoice(inv.id);
  if(pays.length) return sum(pays, 'amount');
  return inv.paid ? num(inv.total) : 0;
}
function balanceForInvoice(inv){ return Math.max(num(inv.total) - paidAmountForInvoice(inv), 0); }
function isInvoiceLiquidated(inv){ return balanceForInvoice(inv) <= 0.009; }
function invoiceStatus(inv){
  const paid = paidAmountForInvoice(inv);
  const balance = balanceForInvoice(inv);
  if(balance <= 0.009) return 'Liquidada';
  if(paid > 0) return 'Parcial';
  return 'Pendiente';
}
function complementPendingForInvoice(inv){
  return paymentsForInvoice(inv.id).filter(p => !p.complementIssued).length;
}
function paymentMonthFilter(row){ return String(row.paymentDate || '').slice(0,7) === state.month; }

function metric(label,value,sub,status='blue'){
  return `<div class="metric ${status}"><div class="l">${esc(label)}</div><div class="v">${esc(value)}</div><div class="s">${esc(sub)}</div></div>`;
}

function getMonthly(){
  const issued = state.issued.filter(monthFilter);
  const received = state.received.filter(monthFilter);
  const services = state.services.filter(monthFilter);
  const paymentsMonth = (state.payments || []).filter(paymentMonthFilter);

  const issuedSubtotal = sum(issued,'subtotal');
  const issuedIva = sum(issued,'iva');
  const issuedTotal = sum(issued,'total');
  const receivedSubtotal = sum(received,'subtotal');
  const receivedIva = sum(received,'iva');
  const receivedTotal = sum(received,'total');

  const collected = sum(paymentsMonth,'amount') + sum(issued.filter(x => paymentsForInvoice(x.id).length === 0 && x.paid),'total');
  const receivable = issued.reduce((acc, inv) => acc + balanceForInvoice(inv), 0);
  const ppdInvoices = issued.filter(x => String(x.paymentMethod || 'PUE').toUpperCase() === 'PPD');
  const ppdBalance = ppdInvoices.reduce((acc, inv) => acc + balanceForInvoice(inv), 0);
  const partialInvoices = issued.filter(x => invoiceStatus(x) === 'Parcial');
  const complementPending = issued.reduce((acc, inv) => acc + complementPendingForInvoice(inv), 0);

  const paidExpenses = sum(received.filter(x=>x.paid),'total');
  const payable = sum(received.filter(x=>!x.paid),'total');

  const ivaToPay = issuedIva - receivedIva;
  const estimatedProfit = collected - paidExpenses;
  const estimatedIsr = Math.max(estimatedProfit,0) * (num(state.isrRate)/100);
  const pendingServices = services.filter(x=>!x.invoiced);
  const servicePendingAmount = sum(pendingServices,'amount');

  return {
    issued, received, services, paymentsMonth,
    issuedSubtotal, issuedIva, issuedTotal,
    receivedSubtotal, receivedIva, receivedTotal,
    collected, receivable, paidExpenses, payable,
    ivaToPay, estimatedProfit, estimatedIsr,
    pendingServices, servicePendingAmount,
    ppdInvoices, ppdBalance, partialInvoices, complementPending
  };
}

function findFirstByLocalName(root, localName){
  return Array.from(root.getElementsByTagName('*')).find(el => el.localName === localName) || null;
}

function findChildrenByLocalName(el, localName){
  if(!el) return [];
  return Array.from(el.children || []).filter(child => child.localName === localName);
}

function attr(el, name){
  if(!el) return '';
  return el.getAttribute(name) || el.getAttribute(name.toLowerCase()) || el.getAttribute(name.toUpperCase()) || '';
}

function parseCfdiXml(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const parserError = doc.getElementsByTagName('parsererror')[0];
  if(parserError){
    throw new Error('El archivo no parece ser un XML válido.');
  }

  const comprobante = doc.documentElement && doc.documentElement.localName === 'Comprobante'
    ? doc.documentElement
    : findFirstByLocalName(doc, 'Comprobante');

  if(!comprobante){
    throw new Error('No encontré el nodo Comprobante del CFDI.');
  }

  const emisor = findFirstByLocalName(doc, 'Emisor');
  const receptor = findFirstByLocalName(doc, 'Receptor');
  const timbre = findFirstByLocalName(doc, 'TimbreFiscalDigital');

  const serie = attr(comprobante, 'Serie');
  const folio = attr(comprobante, 'Folio');
  const uuidFiscal = attr(timbre, 'UUID');
  const invoiceNumber = [serie, folio].filter(Boolean).join('-') || folio || serie || uuidFiscal || '';

  const subtotal = num(attr(comprobante, 'SubTotal'));
  const total = num(attr(comprobante, 'Total'));

  let iva = 0;
  const comprobanteImpuestos = findChildrenByLocalName(comprobante, 'Impuestos')[0];
  const totalTrasladados = num(attr(comprobanteImpuestos, 'TotalImpuestosTrasladados'));
  if(totalTrasladados){
    iva = totalTrasladados;
  }else{
    const traslados = Array.from(doc.getElementsByTagName('*')).filter(el => el.localName === 'Traslado');
    iva = traslados
      .filter(el => attr(el, 'Impuesto') === '002')
      .reduce((acc, el) => acc + num(attr(el, 'Importe')), 0);
  }
  if(!iva && total && subtotal && total >= subtotal){
    iva = +(total - subtotal).toFixed(2);
  }

  return {
    date: String(attr(comprobante, 'Fecha') || '').slice(0,10) || hoy(),
    invoiceNumber,
    subtotal,
    iva:+iva.toFixed(2),
    total,
    uuid: uuidFiscal,
    paymentMethod: attr(comprobante, 'MetodoPago') || 'PUE',
    emisorName: attr(emisor, 'Nombre') || attr(emisor, 'Rfc') || '',
    emisorRfc: attr(emisor, 'Rfc') || '',
    receptorName: attr(receptor, 'Nombre') || attr(receptor, 'Rfc') || '',
    receptorRfc: attr(receptor, 'Rfc') || ''
  };
}

function xmlNotes(data, fileName){
  const pieces = [];
  if(data.uuid) pieces.push('UUID: ' + data.uuid);
  if(data.paymentMethod) pieces.push('Método pago: ' + data.paymentMethod);
  if(data.emisorRfc) pieces.push('Emisor RFC: ' + data.emisorRfc);
  if(data.receptorRfc) pieces.push('Receptor RFC: ' + data.receptorRfc);
  if(fileName) pieces.push('Archivo XML: ' + fileName);
  return pieces.join(' | ');
}

function fillInvoiceFromXml(type, data, fileName){
  const form = document.getElementById(type + 'Form');
  if(!form) return;

  form.elements.date.value = data.date || hoy();
  form.elements.invoiceNumber.value = data.invoiceNumber || '';
  form.elements.subtotal.value = data.subtotal || 0;
  form.elements.iva.value = data.iva || 0;
  form.elements.total.value = data.total || calcTotal(data.subtotal, data.iva);
  if(form.elements.paymentMethod){
    const method = String(data.paymentMethod || 'PUE').toUpperCase();
    form.elements.paymentMethod.value = method === 'PPD' ? 'PPD' : 'PUE';
  }

  if(type === 'issued'){
    form.elements.client.value = data.receptorName || '';
  }else{
    form.elements.provider.value = data.emisorName || '';
  }

  const notesInput = document.getElementById(type + 'XmlNotes');
  if(notesInput) notesInput.value = xmlNotes(data, fileName);

  const preview = document.getElementById(type + 'XmlPreview');
  if(preview){
    const nombre = type === 'issued' ? data.receptorName : data.emisorName;
    preview.innerHTML = `
      <b>XML leído correctamente.</b><br>
      Nombre: ${esc(nombre || 'Sin nombre')}<br>
      Factura: ${esc(data.invoiceNumber || 'Sin folio')}<br>
      Subtotal: ${money(data.subtotal)} · IVA: ${money(data.iva)} · Total: ${money(data.total)}<br>
      ${data.uuid ? 'UUID: ' + esc(data.uuid) : 'UUID no encontrado'}<br><br>
      Revisa los datos y presiona <b>Guardar</b>.
    `;
  }
}

function attachXmlImport(type){
  const input = document.getElementById(type + 'XmlFile');
  if(!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    try{
      const xmlText = await file.text();
      const data = parseCfdiXml(xmlText);
      fillInvoiceFromXml(type, data, file.name);
    }catch(err){
      console.error(err);
      alert(err.message || 'No pude leer el XML.');
    }
  });
}

function render(){
  updateConnectionStatus();
  const main = document.getElementById('main');

  if(!session.role){
    document.getElementById('tabs').innerHTML = '';
    main.innerHTML = viewLogin();
    attachLoginEvents();
    return;
  }

  const allowed = allowedTabs().map(x => x[0]);
  if(!allowed.includes(state.activeTab)){
    state.activeTab = allowed[0];
    saveState();
  }

  renderTabs();
  if(state.activeTab === 'dashboard') main.innerHTML = viewDashboard();
  if(state.activeTab === 'issued') main.innerHTML = viewIssued();
  if(state.activeTab === 'collections') main.innerHTML = viewCollections();
  if(state.activeTab === 'received') main.innerHTML = viewReceived();
  if(state.activeTab === 'services') main.innerHTML = viewServices();
  if(state.activeTab === 'orders') main.innerHTML = viewOrders();
  if(state.activeTab === 'settings') main.innerHTML = viewSettings();
  attachEvents();
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = allowedTabs().map(([id,label]) => `<button class="tab-btn ${state.activeTab===id?'active':''}" data-tab="${id}">${label}</button>`).join('') +
    `<button class="tab-btn" id="logoutBtn" type="button">Salir · ${roleName()}</button>`;
  el.querySelectorAll('[data-tab]').forEach(btn => {
    btn.onclick = () => {
      state.activeTab = btn.dataset.tab;
      saveState();
      render();
    };
  });
  document.getElementById('logoutBtn')?.addEventListener('click', logout);
}

function viewLogin(){
  return `
    <div class="login-card">
      <div class="section-title">
        <div>
          <h2>Acceso SotoMed</h2>
          <p>Entra como administración para ver todo, o como vendedor para capturar pedidos solamente.</p>
          <span class="login-badge">V1.5 · acceso simple por clave</span>
        </div>
      </div>

      <div class="login-grid">
        <div class="card">
          <h3>Administración</h3>
          <p class="sub">Acceso completo al panel: facturas, cobranza, servicios, configuración y pedidos.</p>
          <form class="form" id="adminLoginForm">
            <div class="field"><label>Clave administración</label><input type="password" name="password" autocomplete="current-password"></div>

function attachLoginEvents(){
  document.getElementById('adminLoginForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const password = String(new FormData(e.target).get('password') || '').trim();
    if(password !== ADMIN_PASSWORD){ alert('Clave de administración incorrecta.'); return; }
    session = {role:'admin'};
    saveSession();
    state.activeTab = 'dashboard';
    saveState();
    render();
  });

  document.getElementById('sellerLoginForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const password = String(new FormData(e.target).get('password') || '').trim();
    if(password !== SELLER_PASSWORD){ alert('Clave de vendedor incorrecta.'); return; }
    session = {role:'seller'};
    saveSession();
    state.activeTab = 'orders';
    saveState();
    render();
  });
}

function invoiceBadge(inv){
  const st = invoiceStatus(inv);
  if(st === 'Liquidada') return '<span class="badge good">Liquidada</span>';
  if(st === 'Parcial') return '<span class="badge warn">Parcial</span>';
  return '<span class="badge bad">Pendiente</span>';
}

function invoiceTable(type,rows,compact=false){
  const nameCol = type === 'issued' ? 'Cliente' : 'Proveedor';
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin registros</div></div>`;

  if(type !== 'issued'){
    return `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th><th>${nameCol}</th><th>Factura</th><th>Subtotal</th><th>IVA</th><th>Total</th><th>Estado</th>${compact?'':'<th>Acciones</th>'}
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${esc(r.date)}</td>
                <td>${esc(r.provider)}</td>
                <td>${esc(r.invoiceNumber)}</td>
                <td>${money(r.subtotal)}</td>
                <td>${money(r.iva)}</td>
                <td><b>${money(r.total)}</b></td>
                <td>${r.paid ? '<span class="badge good">Pagada</span>' : '<span class="badge warn">Pendiente</span>'}</td>
                ${compact?'':`<td>
                  <button class="small-btn" data-toggle-paid="${type}" data-id="${esc(r.id)}">${r.paid?'Marcar pendiente':'Marcar pagada'}</button>
                  <button class="danger-btn small-btn" data-delete="${type}" data-id="${esc(r.id)}">Borrar</button>
                </td>`}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th><th>Cliente</th><th>Factura</th><th>Método</th><th>Total</th><th>Abonado</th><th>Saldo</th><th>Estado</th><th>Comp.</th>${compact?'':'<th>Acciones</th>'}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => {
            const paidAmount = paidAmountForInvoice(r);
            const balance = balanceForInvoice(r);
            const compPending = complementPendingForInvoice(r);
            return `
              <tr>
                <td>${esc(r.date)}</td>
                <td>${esc(r.client)}</td>
                <td>${esc(r.invoiceNumber)}</td>
                <td><span class="badge ${String(r.paymentMethod||'PUE').toUpperCase()==='PPD'?'warn':'good'}">${esc(r.paymentMethod || 'PUE')}</span></td>
                <td><b>${money(r.total)}</b></td>
                <td>${money(paidAmount)}</td>
                <td><b>${money(balance)}</b></td>
                <td>${invoiceBadge(r)}</td>
                <td>${compPending ? '<span class="badge warn">'+compPending+' pendiente(s)</span>' : '<span class="badge good">OK</span>'}</td>
                ${compact?'':`<td>
                  <button class="small-btn" data-add-payment="${esc(r.id)}">Agregar pago</button>
                  <button class="small-btn" data-toggle-paid="issued" data-id="${esc(r.id)}">${balance<=0?'Marcar pendiente':'Liquidar'}</button>
                  <button class="danger-btn small-btn" data-delete="issued" data-id="${esc(r.id)}">Borrar</button>
                </td>`}
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function paymentsTable(rows,compact=false){
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin pagos registrados</div></div>`;
  const invoiceById = new Map((state.issued || []).map(inv => [String(inv.id), inv]));
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha pago</th><th>Factura</th><th>Cliente</th><th>Monto</th><th>Forma</th><th>Complemento</th>${compact?'':'<th>Acciones</th>'}
          </tr>
        </thead>
        <tbody>
          ${rows.map(p => {
            const inv = invoiceById.get(String(p.invoiceId)) || {};
            return `
              <tr>
                <td>${esc(p.paymentDate || '')}</td>
                <td>${esc(inv.invoiceNumber || p.invoiceId || '')}</td>
                <td>${esc(inv.client || '')}</td>
                <td><b>${money(p.amount)}</b></td>
                <td>${esc(p.paymentMethod || '')}</td>
                <td>${p.complementIssued ? '<span class="badge good">Emitido</span>' : '<span class="badge warn">Pendiente</span>'}</td>
                ${compact?'':`<td>
                  <button class="small-btn" data-toggle-complement="${esc(p.id)}">${p.complementIssued?'Marcar pendiente':'Marcar emitido'}</button>
                  <button class="danger-btn small-btn" data-delete="payments" data-id="${esc(p.id)}">Borrar</button>
                </td>`}
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function ordersTable(rows){
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin pedidos registrados</div></div>`;
  const statuses = ['Pendiente almacén','Surtido','Parcial','Sin existencia','Cancelado'];
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th><th>Vendedor</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>Notas</th><th>Estatus</th>${session.role==='admin'?'<th>Acciones</th>':''}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${esc(r.date)}</td>
              <td>${esc(r.seller)}</td>
              <td>${esc(r.client)}</td>
              <td>${esc(r.product)}</td>
              <td><b>${esc(r.qty)}</b></td>
              <td>${esc(r.notes || '')}</td>
              <td><span class="badge ${r.status==='Surtido'?'good':(r.status==='Cancelado'||r.status==='Sin existencia'?'bad':'warn')}">${esc(r.status || 'Pendiente almacén')}</span></td>
              ${session.role==='admin'?`<td>
                <select data-order-status="${esc(r.id)}">
                  ${statuses.map(s => `<option value="${s}" ${s===(r.status || 'Pendiente almacén')?'selected':''}>${s}</option>`).join('')}
                </select>
                <button class="danger-btn small-btn" style="margin-top:8px" data-delete="orders" data-id="${esc(r.id)}">Borrar</button>
              </td>`:''}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function servicesTable(rows){
  if(!rows.length) return `<div class="table-wrap"><div class="empty">Sin registros</div></div>`;
  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th><th>Cliente</th><th>Folio</th><th>Equipo</th><th>Trabajo</th><th>Monto</th><th>Estado</th><th>Factura</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${esc(r.date)}</td>
              <td>${esc(r.client)}</td>
              <td>${esc(r.serviceNumber)}</td>
              <td>${esc(r.equipment)}</td>
              <td>${esc(r.work)}</td>
              <td><b>${money(r.amount)}</b></td>
              <td>${r.invoiced ? '<span class="badge good">Facturado</span>' : '<span class="badge warn">Pendiente</span>'}</td>
              <td>${esc(r.invoiceNumber || '')}</td>
              <td>
                <button class="small-btn" data-toggle-service="${esc(r.id)}">${r.invoiced?'Marcar pendiente':'Marcar facturado'}</button>
                <button class="danger-btn small-btn" data-delete="services" data-id="${esc(r.id)}">Borrar</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function attachEvents(){
  document.getElementById('monthInput')?.addEventListener('change', e => {
    state.month = e.target.value || state.month;
    saveState();
    render();
  });

  document.getElementById('reloadBtn')?.addEventListener('click', () => {
    state = loadState();
    render();
  });

  autoCalc('issued');
  autoCalc('received');
  attachXmlImport('issued');
  attachXmlImport('received');

  document.getElementById('issuedForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const item = {
      id:uid(), date:fd.get('date') || hoy(), client:fd.get('client') || '', invoiceNumber:fd.get('invoiceNumber') || '',
      subtotal:num(fd.get('subtotal')), iva:num(fd.get('iva')), total:num(fd.get('total')), paid:fd.get('paid')==='on',
      paymentDate:fd.get('paymentDate') || '', notes:fd.get('xmlNotes') || '',
      paymentMethod:fd.get('paymentMethod') || 'PUE', dueDate:fd.get('dueDate') || ''
    };
    await addItem('issued',item);
  });

  document.getElementById('receivedForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const item = {
      id:uid(), date:fd.get('date') || hoy(), provider:fd.get('provider') || '', invoiceNumber:fd.get('invoiceNumber') || '',
      subtotal:num(fd.get('subtotal')), iva:num(fd.get('iva')), total:num(fd.get('total')), paid:fd.get('paid')==='on',
      paymentDate:fd.get('paymentDate') || '', notes:fd.get('xmlNotes') || '',
      paymentMethod:fd.get('paymentMethod') || 'PUE', dueDate:fd.get('dueDate') || ''
    };
    await addItem('received',item);
  });

  document.getElementById('serviceForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const item = {
      id:uid(), date:fd.get('date') || hoy(), client:fd.get('client') || '', serviceNumber:fd.get('serviceNumber') || '',
      equipment:fd.get('equipment') || '', work:fd.get('work') || '', amount:num(fd.get('amount')),
      invoiced:fd.get('invoiced')==='on', invoiceNumber:fd.get('invoiceNumber') || ''
    };
    await addItem('services',item);
  });

  document.getElementById('orderForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const item = {
      id:uid(), date:fd.get('date') || hoy(), seller:fd.get('seller') || '', client:fd.get('client') || '',
      product:fd.get('product') || '', qty:num(fd.get('qty')), notes:fd.get('notes') || '',
      status:'Pendiente almacén'
    };
    if(!item.client || !item.product){
      alert('Captura al menos cliente y producto/descripción.');
      return;
    }
    await addItem('orders',item);
  });

  document.getElementById('taxSettingsForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    state.ivaRate = num(fd.get('ivaRate'));
    state.isrRate = num(fd.get('isrRate'));
    saveState();
    alert('Configuración guardada en esta computadora.');
    render();
  });

  document.getElementById('exportBackupBtn')?.addEventListener('click', () => {
    exportBackup();
  });

  document.getElementById('importBackupBtn')?.addEventListener('click', async () => {
    const input = document.getElementById('backupFile');
    const file = input?.files?.[0];
    if(!file){
      alert('Selecciona primero un archivo de respaldo JSON.');
      return;
    }
    if(!confirm('¿Restaurar este respaldo? Los datos actuales serán reemplazados.')) return;
    try{
      await importBackupFile(file);
      alert('Respaldo restaurado correctamente.');
      render();
    }catch(err){
      console.error(err);
      alert('No pude restaurar el respaldo. Verifica que sea un archivo JSON válido de SotoMed Control.');
    }
  });

  document.getElementById('clearLocalBtn')?.addEventListener('click', () => {
    if(confirm('¿Borrar todos los datos guardados en esta computadora? Esta acción no se puede deshacer sin un respaldo.')){
      localStorage.removeItem(STORAGE_KEY);
      state = {...seed};
      saveState();
      render();
    }
  });

  document.querySelectorAll('[data-add-payment]').forEach(btn => {
    btn.onclick = async () => {
      const invoiceId = btn.dataset.addPayment;
      const inv = state.issued.find(x => String(x.id) === String(invoiceId));
      if(!inv) return;
      const balance = balanceForInvoice(inv);
      if(balance <= 0){
        alert('Esta factura ya está liquidada.');
        return;
      }
      const amountRaw = prompt('Monto del pago / abono:', String(balance.toFixed(2)));
      if(amountRaw === null) return;
      const amount = num(amountRaw);
      if(amount <= 0){ alert('Monto inválido.'); return; }
      const paymentDate = prompt('Fecha de pago:', hoy()) || hoy();
      const method = prompt('Forma de pago:', 'Transferencia') || 'Transferencia';
      const complementIssued = confirm('¿Ya emitiste el complemento de pago para este abono?');
      const complementDate = complementIssued ? (prompt('Fecha del complemento:', paymentDate) || paymentDate) : '';
      const item = {
        id:uid(), invoiceId, paymentDate, amount,
        paymentMethod:method, complementIssued, complementDate,
        notes:''
      };
      state.payments.unshift(item);
      inv.paid = isInvoiceLiquidated(inv);
      saveState();
      render();
    };
  });

  document.querySelectorAll('[data-toggle-complement]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.toggleComplement;
      const pay = state.payments.find(x => String(x.id) === String(id));
      if(!pay) return;
      pay.complementIssued = !pay.complementIssued;
      pay.complementDate = pay.complementIssued ? (pay.complementDate || hoy()) : '';
      saveState();
      render();
    };
  });

  document.querySelectorAll('[data-toggle-paid]').forEach(btn => {
    btn.onclick = async () => {
      const type = btn.dataset.togglePaid;
      const id = btn.dataset.id;
      const item = state[type].find(x => String(x.id) === String(id));
      if(!item) return;

      if(type === 'issued'){
        const balance = balanceForInvoice(item);
        const existingPayments = paymentsForInvoice(item.id);
        if(balance > 0){
          const ok = confirm('Esto registrará un pago por el saldo restante para liquidar la factura. ¿Continuar?');
          if(!ok) return;
          const pay = {
            id:uid(), invoiceId:item.id, paymentDate:hoy(), amount:balance,
            paymentMethod:'Liquidación', complementIssued:String(item.paymentMethod||'PUE').toUpperCase()==='PUE',
            complementDate:String(item.paymentMethod||'PUE').toUpperCase()==='PUE' ? hoy() : '', notes:'Liquidación rápida'
          };
          state.payments.unshift(pay);
          item.paid = true;
        }else{
          if(existingPayments.length){
            alert('Esta factura tiene pagos registrados. Para dejarla pendiente borra primero los pagos/abonos relacionados.');
            return;
          }
          item.paid = false;
          item.paymentDate = '';
        }
      }else{
        item.paid = !item.paid;
        item.paymentDate = item.paid ? (item.paymentDate || hoy()) : '';
      }
      saveState();
      render();
    };
  });

  document.querySelectorAll('[data-toggle-service]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.toggleService;
      const item = state.services.find(x => String(x.id) === String(id));
      if(!item) return;
      item.invoiced = !item.invoiced;
      if(item.invoiced && !item.invoiceNumber){
        item.invoiceNumber = prompt('Número de factura relacionada, si aplica:', '') || '';
      }
      saveState();
      render();
    };
  });

  document.querySelectorAll('[data-order-status]').forEach(select => {
    select.onchange = async () => {
      const id = select.dataset.orderStatus;
      const item = state.orders.find(x => String(x.id) === String(id));
      if(!item) return;
      item.status = select.value;
      saveState();
      render();
    };
  });

  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.onclick = async () => {
      const type = btn.dataset.delete;
      const id = btn.dataset.id;
      if(!confirm('¿Borrar este registro?')) return;
      state[type] = state[type].filter(x => String(x.id) !== String(id));
      if(type === 'issued'){
        state.payments = state.payments.filter(p => String(p.invoiceId) !== String(id));
      }
      saveState();
      render();
    };
  });
}

function autoCalc(type){
  const sub = document.getElementById(type+'Subtotal');
  const iva = document.getElementById(type+'Iva');
  const total = document.getElementById(type+'Total');
  if(!sub || !iva || !total) return;

  function update(){
    const ivaCalc = calcIva(sub.value);
    iva.value = ivaCalc;
    total.value = calcTotal(sub.value, ivaCalc);
  }
  sub.addEventListener('input', update);
  iva.addEventListener('input', () => total.value = calcTotal(sub.value, iva.value));
}

async function addItem(type,item){
  try{
    state[type].unshift(item);
    saveState();
    render();
  }catch(err){
    console.error(err);
    alert('No pude guardar los datos en esta computadora.');
  }
}

updateConnectionStatus();
render();
</script>
</body>
</html>
